name: datagate_experiments
services:
  data_source_postgres:
    image: postgres:18
    container_name: data_source_postgres
    env_file:
      - ./.env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - datagate_net
volumes:
  postgres_data:
networks:
  datagate_net:
    external: true