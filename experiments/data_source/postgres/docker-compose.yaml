name: datagate_experiments
services:
  data_source_postgres:
    image: postgres:18
    container_name: experiments_data_source_postgres
    env_file:
      - ./.env
    ports:
      - "54321:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql
    restart: unless-stopped 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - datagate_net
# volumes:
#   postgres_data:
networks:
  datagate_net:
    external: true