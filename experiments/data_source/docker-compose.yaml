services:
  datasource_database:
    image: postgres:15
    container_name: datasource_database
    env_file:
      - ./.env
    ports:
      - "54321:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
    networks:
      - data_platform_net
networks:
  data_platform_net:
    external: true