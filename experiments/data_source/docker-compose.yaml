name: data-source
services:
  datasource-database:
    image: postgres:15
    container_name: datasource-database
    env_file:
      - ./.env
    ports:
      - "54321:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
    restart: unless-stopped 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - data-platform-net
networks:
  data-platform-net:
    external: true