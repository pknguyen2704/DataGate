name: datagate_experiments

services:
  data_pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: data_pipeline
    env_file:
      - .env
    volumes:
      - data_pipeline_checkpoint:/app/auto_loader/checkpoint
    networks:
      - datagate_net
    restart: unless-stopped

volumes:
  data_pipeline_checkpoint:

networks:
  datagate_net:
    external: true
