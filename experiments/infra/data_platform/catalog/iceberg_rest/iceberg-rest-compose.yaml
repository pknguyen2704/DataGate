services:
  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: iceberg-rest
    env_file:
      - .env
    ports:
      - "8181:8181"
    restart: unless-stopped
    user: root
    volumes:
      - iceberg_rest_data:/tmp/iceberg
    networks:
      - datagate-net

volumes:
  iceberg_rest_data:

networks:
  datagate-net:
    external: true