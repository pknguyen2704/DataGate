  datagate_notebook:
    image: datagatesolution/datagate-notebook:1.0.0
    container_name: datagate_notebook
    ports:
      - "8888:8888" # Jupyter Lab UI
      - "4040:4040" # Spark UI 1
      - "4041:4041" # Spark UI 2
      - "4042:4042" # Spark UI 3
    env_file:
      - .env
    volumes:
      - ../../../../training_model:/opt/spark/work-dir/training_model
      - ../../shared/config:/opt/spark/conf
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSI http://localhost:8888/lab?token=$${JUPYTER_TOKEN:-dev-token} | grep -i \"content-security-policy:.*frame-ancestors \\*\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    networks:
      - datagate-net

  datagate_dashboard:
    image: datagatesolution/datagate-dashboard:1.0.0
    container_name: datagate_dashboard
    env_file:
      - .env
    ports:
      - '3000:3000'
    volumes:
      - datagate_grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - datagate-net

volumes:
  datagate_postgres_data:
  datagate_grafana_data:

networks:
  datagate-net:
    external: true
