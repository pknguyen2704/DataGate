spark.app.name                                  DataGate-Spark

spark.driver.cores                              2
spark.driver.memory                             4g

spark.executor.instances                        2
spark.executor.cores                            6
spark.executor.memory                           10g

spark.serializer                                org.apache.spark.serializer.KryoSerializer
spark.kryoserializer.buffer                     64m
spark.kryoserializer.buffer.max                 512m
spark.scheduler.mode                            FAIR
spark.scheduler.allocation.file                 /opt/spark/conf/fairscheduler.xml
spark.standalone.submit.waitAppCompletion       true

spark.network.timeout                           600s
spark.executor.heartbeatInterval                60s
spark.sql.broadcastTimeout                      600

spark.sql.catalog.iceberg.write.format.default  parquet
spark.sql.session.timeZone                      Asia/Ho_Chi_Minh
spark.driver.extraJavaOptions                   -Daws.region=us-east-1 -Duser.timezone=Asia/Ho_Chi_Minh --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.invoke=ALL-UNNAMED --add-opens=java.base/java.lang.reflect=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED --add-opens=java.base/java.net=ALL-UNNAMED --add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.util.concurrent=ALL-UNNAMED --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/sun.nio.cs=ALL-UNNAMED --add-opens=java.base/sun.security.action=ALL-UNNAMED --add-opens=java.base/sun.util.calendar=ALL-UNNAMED --add-opens=java.security.jgss/sun.security.krb5=ALL-UNNAMED
spark.executor.extraJavaOptions                 -Daws.region=us-east-1 -Duser.timezone=Asia/Ho_Chi_Minh --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.invoke=ALL-UNNAMED --add-opens=java.base/java.lang.reflect=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED --add-opens=java.base/java.net=ALL-UNNAMED --add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.util.concurrent=ALL-UNNAMED --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/sun.nio.cs=ALL-UNNAMED --add-opens=java.base/sun.security.action=ALL-UNNAMED --add-opens=java.base/sun.util.calendar=ALL-UNNAMED --add-opens=java.security.jgss/sun.security.krb5=ALL-UNNAMED