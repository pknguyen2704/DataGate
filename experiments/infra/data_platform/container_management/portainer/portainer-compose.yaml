services:
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:sts
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    env_file:
      - .env
    ports:
      - 9000:9000
    networks:
      - datagate-net

volumes:
  portainer_data:

networks:
  datagate-net:
    external: true