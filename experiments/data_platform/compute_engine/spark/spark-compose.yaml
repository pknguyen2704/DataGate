services:
  spark-master:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: spark-master
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./conf:/opt/spark/conf
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
      --host spark-master
      --port 7077
      --webui-port 8080
    networks:
      - datagate-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  spark-worker-1:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: spark-worker-1
    depends_on:
      spark-master:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8081:8081"
    volumes:
      - ./conf:/opt/spark/conf
      - ${DATAGATE_JOBS_DIR}:/opt/spark/work-dir/datagate
      - ${EXPERIMENT_JOBS_DIR}:/opt/spark/work-dir/experiments:ro
      - ./logs:/opt/spark/work
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
      --cores 2
      --memory 4G
      --webui-port 8081
    networks:
      - datagate-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  spark-worker-2:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: spark-worker-2
    depends_on:
      spark-master:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8082:8081"
    volumes:
      - ./conf:/opt/spark/conf
      - ${DATAGATE_JOBS_DIR}:/opt/spark/work-dir/datagate
      - ${EXPERIMENT_JOBS_DIR}:/opt/spark/work-dir/experiments:ro
      - ./logs:/opt/spark/work
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
      --cores 2
      --memory 4G
      --webui-port 8081
    networks:
      - datagate-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  spark-client:
    build:
      context: .
      dockerfile: ./Dockerfile
    hostname: spark-client
    container_name: spark-client
    depends_on:
      spark-master:
        condition: service_healthy
      spark-worker-1:
        condition: service_healthy
      spark-worker-2:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./conf:/opt/spark/conf
      - ${DATAGATE_JOBS_DIR}:/opt/spark/work-dir/datagate
      - ${EXPERIMENT_JOBS_DIR}:/opt/spark/work-dir/experiments:ro
    command: ["bash", "-lc", "tail -f /dev/null"]
    networks:
      - datagate-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -x /opt/spark/bin/spark-submit"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  datagate-net:
    external: true