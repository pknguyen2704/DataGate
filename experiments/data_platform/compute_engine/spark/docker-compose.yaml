services:
  spark_master:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: platform_spark_master
    hostname: platform_spark_master
    env_file:
      - ./.env
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    volumes:
      - ./conf:/opt/spark/conf
    entrypoint:
      - /bin/bash
      - -c
      - /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host platform_spark_master --port 7077 --webui-port 8080
    networks:
      - platform_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  spark_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: platform_spark_worker
    hostname: platform_spark_worker
    depends_on:
      spark_master:
        condition: service_healthy
    ports:
      - "8081:8081"
    env_file:
      - ./.env
    volumes:
      - ./conf:/opt/spark/conf
    entrypoint:
      - /bin/bash
      - -c
      - /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://platform_spark_master:7077 --cores 4 --memory 4G --webui-port 8081
    networks:
      - platform_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

networks:
  platform_net:
    external: true