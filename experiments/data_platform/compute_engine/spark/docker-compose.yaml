services:
  data_platform_spark_master:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    hostname: data-platform-spark-master
    container_name: data_platform_spark_master
    env_file:
      - ./.env
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    volumes:
      - ./conf:/opt/spark/conf
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host data-platform-spark-master
      --port 7077
      --webui-port 8080
    networks:
      - data_platform_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  data_platform_spark_worker:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    hostname: data-platform-spark-worker
    container_name: data_platform_spark_worker
    depends_on:
      data_platform_spark_master:
        condition: service_healthy
    ports:
      - "8081:8081"
    env_file:
      - ./.env
    volumes:
      - ./conf:/opt/spark/conf
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      --cores 2
      --memory 4G
      --webui-port 8081
      spark://data-platform-spark-master:7077
    networks:
      - data_platform_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

networks:
  data_platform_net:
    external: true