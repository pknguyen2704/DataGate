services:
  minio:
    image: minio/minio:latest
    hostname: minio
    container_name: datagate_minio
    command: server /data --console-address ":9001"
    env_file:
      - ./.env
    ports:
      - "9001:9001"
    volumes:
      - ./minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - datagate_net


networks:
  datagate_net:
    external: true