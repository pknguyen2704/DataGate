services:
  minio:
    image: minio/minio:latest
    container_name: datagate_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - datagate_net

  minio-init:
    image: minio/mc:latest
    container_name: datagate_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set myminio http://minio:9000 minioadmin minioadmin; do echo '...waiting...' && sleep 1; done;
      mc mb myminio/warehouse;
      mc mb myminio/staging;
      mc anonymous set public myminio/warehouse;
      exit 0;
      "
    networks:
      - datagate_net

volumes:
  minio_data:

networks:
  datagate_net:
    external: true
