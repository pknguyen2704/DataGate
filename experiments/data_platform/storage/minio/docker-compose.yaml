name: data_platform

services:
  minio:
    image: minio/minio:latest
    container_name: data_platform_minio
    hostname: minio
    command: server /data --console-address ":9001"
    env_file:
      - ./.env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio_data:/data
    networks:
      - data_platform_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  create_buckets:
    image: alpine:3.20
    container_name: data_platform_create_buckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -ec "
      apk add --no-cache curl ca-certificates &&
      curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc &&
      chmod +x /usr/local/bin/mc &&

      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb -p myminio/lakehouse &&

      # create prefix objects so folders show up
      mc cp /dev/null myminio/lakehouse/bronze/.keep &&
      mc cp /dev/null myminio/lakehouse/silver/.keep &&
      mc cp /dev/null myminio/lakehouse/gold/.keep &&

      mc ls myminio &&
      mc ls myminio/lakehouse
      "
    env_file:
      - ./.env
    networks:
      - data_platform_net

# volumes:
#   minio_data:

networks:
  data_platform_net:
    external: true