name: data_platform
services:
  minio:
    image: minio/minio:latest
    hostname: minio
    container_name: data_platform_minio
    command: server /data --console-address ":9001"
    env_file:
      - ./.env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio_data:/data
    networks:
      - data_platform_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://minio:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  create_buckets:
    image: minio/mc
    container_name: data_platform_create_buckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb -p myminio/lakehouse;
      /usr/bin/mc pipe myminio/lakehouse/bronze/.keep;
      /usr/bin/mc pipe myminio/lakehouse/silver/.keep;
      /usr/bin/mc pipe myminio/lakehouse/gold/.keep;
      exit 0;
      "
    env_file:
      - ./.env
    networks:
      - data_platform_net

# volumes:
#   minio_data:

networks:
  data_platform_net:
    external: true