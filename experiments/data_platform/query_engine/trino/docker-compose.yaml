name: data_platform
services:
  trino:
    image: 'trinodb/trino:479'
    hostname: trino
    container_name: data_platform_trino
    ports:
      - '8085:8080'
    volumes:
      - ./etc:/etc/trino
      - ./hadoop_config:/etc/hadoop/conf
    environment:
      - TZ=Asia/Ho_Chi_Minh
    networks:
      - data_platform_net

networks:
  data_platform_net:
    external: true