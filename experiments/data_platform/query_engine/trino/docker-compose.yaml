name: datagate_experiments
services:
  trino:
    image: 'trinodb/trino:479'
    hostname: trino
    container_name: experiments_data_platform_trino
    ports:
      - '8085:8080'
    volumes:
      - ./etc:/etc/trino
    environment:
      - TZ=Asia/Ho_Chi_Minh
    networks:
      - datagate_net

networks:
  datagate_net:
    external: true