name: datagate_experiments

services:
  iceberg_rest:
    image: apache/iceberg-rest-fixture:1.10.1
    container_name: data_platform_iceberg_rest
    hostname: iceberg-rest
    env_file:
      - ./.env
    ports:
      - "8181:8181"
    networks:
      - datagate_net
    environment:
      - JAVA_OPTS=-Diceberg.s3.path-style-access=true -Diceberg.s3.endpoint=http://minio:9000
    restart: unless-stopped
    user: root
    volumes:
      - catalog_data:/var/lib/iceberg

volumes:
  catalog_data:

networks:
  datagate_net:
    external: true