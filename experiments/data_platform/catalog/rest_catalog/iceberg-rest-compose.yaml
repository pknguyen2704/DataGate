services:
  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: iceberg-rest
    env_file:
      - .env
    ports:
      - "8181:8181"
    networks:
      - datagate-net
    restart: unless-stopped
    user: root
    volumes:
      - catalog_data:/tmp/iceberg

volumes:
  catalog_data:

networks:
  datagate-net:
    external: true