services:
  catalog-db:
    image: postgres:15  
    container_name: data-platform-catalog-db
    hostname: catalog-db
    env_file:
      - ./.env
    networks:
      - data-platform-net
    expose:
      - "5432"
    volumes:
      - ./catalog-data:/var/lib/postgresql/data
    restart: unless-stopped 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  iceberg-rest:
    depends_on:
      catalog-db:
        condition: service_healthy
    image: tabulario/iceberg-rest:latest
    container_name: data-platform-iceberg-rest
    hostname: iceberg-rest
    ports:
      - "8181:8181"
    env_file:
      - ./.env
    networks:
      - data-platform-net
    restart: unless-stopped 
    healthcheck:
      test: ["CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/8181' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s


networks:
  data-platform-net:
    external: true