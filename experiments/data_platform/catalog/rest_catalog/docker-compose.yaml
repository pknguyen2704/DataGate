name: data_platform
services:
  catalog_db:
    image: postgres:15  
    container_name: data_platform_catalog_db
    hostname: catalog-db
    env_file:
      - ./.env
    networks:
      - data_platform_net
    expose:
      - "5432"
    volumes:
      - ./catalog_data:/var/lib/postgresql/data
    restart: unless-stopped 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  iceberg_rest:
    depends_on:
      catalog_db:
        condition: service_healthy
    image: tabulario/iceberg-rest:latest
    container_name: data_platform_iceberg_rest
    hostname: iceberg-rest
    ports:
      - "8181:8181"
    env_file:
      - ./.env
    networks:
      - data_platform_net
    restart: unless-stopped 
    healthcheck:
      test: ["CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/8181' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

# volumes:
#   catalog_data:

networks:
  data_platform_net:
    external: true