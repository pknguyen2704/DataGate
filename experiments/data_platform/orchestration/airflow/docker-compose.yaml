services:
  airflow-webserver:
    build: .
    container_name: datagate_airflow_webserver
    command: webserver
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5
      start_period: 30s
    env_file:
      - airflow.env
    depends_on:
      - airflow-init
      - postgres
    networks:
      - datagate_net
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins

  airflow-scheduler:
    build: .
    container_name: datagate_airflow_scheduler
    command: scheduler
    env_file:
      - airflow.env
    depends_on:
      - airflow-init
      - postgres
    networks:
      - datagate_net
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins

  airflow-init:
    build: .
    container_name: datagate_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /sources/logs /sources/dags /sources/plugins
        chown -R airflow:0 /sources/{logs,dags,plugins}
        exec /entrypoint airflow version && airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com
    env_file:
      - airflow.env
    depends_on:
      - postgres
    networks:
      - datagate_net
    user: "0:0"
    volumes:
      - .:/sources

  postgres:
    image: postgres:15
    container_name: datagate_airflow_postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    networks:
      - datagate_net

networks:
  datagate_net:
    external: true
