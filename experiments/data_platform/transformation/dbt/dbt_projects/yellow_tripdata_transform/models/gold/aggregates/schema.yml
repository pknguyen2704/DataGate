version: 2

models:
  - name: gold_mart_daily_trips
    description: "Daily aggregated KPIs for taxi trips."
    columns:
      - name: pickup_date
        tests:
          - unique
          - not_null
      - name: total_trips
        tests:
          - not_null
      - name: total_revenue
        tests:
          - not_null

  - name: gold_mart_hourly_trips
    description: "Hourly demand patterns by day of week."
    columns:
      - name: pickup_hour
        tests:
          - not_null
      - name: pickup_day_of_week
        tests:
          - not_null
