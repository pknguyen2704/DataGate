
name: 'yellow_tripdata_transform'
version: '1.0.0'

profile: 'yellow_tripdata_transform'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# ---------------------------------------------------------------------------
# Medallion Architecture – Layer Configuration
#
# Layer     | Folder    | Schema  | Materialization | Naming Prefix
# ----------|-----------|---------|-----------------|---------------
# Bronze    | (source)  | bronze  | external        | raw_*
# Silver    | silver/   | silver  | table           | silver_*
# Gold      | gold/     | gold    | table           | gold_*
# ---------------------------------------------------------------------------

models:
  yellow_tripdata_transform:

    # Silver – Cleaned, typed, and standardized data
    silver:
      +schema: silver
      +materialized: table

    # Gold – Data marts: dimensional model & aggregates
    gold:
      +schema: gold
      +materialized: table

      dimensions:
        # inherits +materialized: table from parent
      facts:
        # inherits +materialized: table from parent
      aggregates:
        # inherits +materialized: table from parent
