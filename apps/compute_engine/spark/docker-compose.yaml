name: datagate
services:
  datagate_spark_master:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    hostname: datagate-spark-master
    container_name: datagate_spark_master
    env_file:
      - ./.env
    ports:
      - "18080:8080"
    volumes:
      - ./conf:/opt/spark/conf
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
      --host datagate-spark-master
      --port 7077
      --webui-port 8080
    networks:
      - datagate_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  datagate_spark_worker_1:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    hostname: datagate-spark-worker-1
    container_name: datagate_spark_worker_1
    depends_on:
      datagate_spark_master:
        condition: service_healthy
    env_file:
      - ./.env
    ports:
      - "18081:8081"
    volumes:
      - ./conf:/opt/spark/conf
      - ${SPARK_JOBS_DIR}:/opt/spark/jobs
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://datagate-spark-master:7077
      --cores 2
      --memory 4G
      --webui-port 8081
    networks:
      - datagate_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  datagate_spark_worker_2:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    hostname: datagate-spark-worker-2
    container_name: datagate_spark_worker_2
    depends_on:
      datagate_spark_master:
        condition: service_healthy
    env_file:
      - ./.env
    ports:
      - "18082:8081"
    volumes:
      - ./conf:/opt/spark/conf
      - ${SPARK_JOBS_DIR}:/opt/spark/jobs
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://datagate-spark-master:7077
      --cores 2
      --memory 4G
      --webui-port 8081
    networks:
      - datagate_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  datagate_spark_client:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    hostname: datagate-spark-client
    container_name: datagate_spark_client
    depends_on:
      datagate_spark_master:
        condition: service_healthy
      datagate_spark_worker_1:
        condition: service_healthy
      datagate_spark_worker_2:
        condition: service_healthy
    env_file:
      - ./.env
    volumes:
      - ./conf:/opt/spark/conf
      - ${SPARK_JOBS_DIR}:/opt/spark/jobs
    command: ["bash", "-lc", "tail -f /dev/null"]
    networks:
      - datagate_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -x /opt/spark/bin/spark-submit"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  datagate_net:
    external: true