services:
  datagate_spark_master:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    hostname: datagate-spark-master
    container_name: datagate_spark_master
    env_file:
      - ./.env
    ports:
      - "18080:8080"
      - "17077:7077"
      - "14040:4040"
    volumes:
      - ./conf:/opt/spark/conf
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host datagate-spark-master
      --port 7077
      --webui-port 8080
    networks:
      - datagate_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  datagate_spark_worker:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    hostname: datagate-spark-worker
    container_name: datagate_spark_worker
    depends_on:
      datagate_spark_master:
        condition: service_healthy
    ports:
      - "18081:8081"
    env_file:
      - ./.env
    volumes:
      - ./conf:/opt/spark/conf
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      --cores 2
      --memory 4G
      --webui-port 8081
      spark://datagate-spark-master:7077
    networks:
      - datagate_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

networks:
  datagate_net:
    external: true