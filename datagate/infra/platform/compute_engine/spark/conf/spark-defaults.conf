#############################################
# Cluster mode
#############################################

spark.submit.deployMode                     client
spark.app.name                              Data-Platform-Spark-Cluster


#############################################
# Timezone & Java 17 Module Access
#############################################

spark.driver.extraJavaOptions               -Duser.timezone=Asia/Ho_Chi_Minh --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.invoke=ALL-UNNAMED --add-opens=java.base/java.lang.reflect=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED --add-opens=java.base/java.net=ALL-UNNAMED --add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.util.concurrent=ALL-UNNAMED --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/sun.nio.cs=ALL-UNNAMED --add-opens=java.base/sun.security.action=ALL-UNNAMED --add-opens=java.base/sun.util.calendar=ALL-UNNAMED --add-opens=java.security.jgss/sun.security.krb5=ALL-UNNAMED

spark.executor.extraJavaOptions             -Duser.timezone=Asia/Ho_Chi_Minh --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.invoke=ALL-UNNAMED --add-opens=java.base/java.lang.reflect=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED --add-opens=java.base/java.net=ALL-UNNAMED --add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.util.concurrent=ALL-UNNAMED --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/sun.nio.cs=ALL-UNNAMED --add-opens=java.base/sun.security.action=ALL-UNNAMED --add-opens=java.base/sun.util.calendar=ALL-UNNAMED --add-opens=java.security.jgss/sun.security.krb5=ALL-UNNAMED

spark.sql.session.timeZone                  Asia/Ho_Chi_Minh


#############################################
# Iceberg + S3 (giữ nguyên)
#############################################

spark.sql.catalog.iceberg.io-impl                    org.apache.iceberg.aws.s3.S3FileSystem
spark.sql.catalog.iceberg.s3.client.factory org.apache.iceberg.aws.s3.S3ClientFactory
spark.sql.extensions                        org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.iceberg                   org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iceberg.catalog-impl      org.apache.iceberg.rest.RESTCatalog
spark.sql.catalog.iceberg.s3.path-style-access true
spark.sql.catalog.iceberg.write.format  parquet
#############################################
# Executor tuning (FIX CHUẨN)
#############################################

spark.executor.instances                    4
spark.executor.cores                        2
spark.executor.memory                       3g          # giảm để tránh full RAM
spark.executor.memoryOverhead               1g


#############################################
# Memory tuning
#############################################

spark.memory.fraction                       0.6
spark.memory.storageFraction                0.5


#############################################
# Parallelism (FIX)
#############################################

spark.sql.shuffle.partitions                100
spark.default.parallelism                   12          # tăng nhẹ để tận dụng CPU


#############################################
# Adaptive Query Execution
#############################################

spark.sql.adaptive.enabled                  true
spark.sql.adaptive.coalescePartitions.enabled true
spark.sql.adaptive.skewJoin.enabled         true


#############################################
# Serialization
#############################################

spark.serializer                            org.apache.spark.serializer.KryoSerializer


#############################################
# Scheduler
#############################################

spark.scheduler.mode                        FAIR
spark.scheduler.allocation.file             /opt/spark/conf/fairscheduler.xml


#############################################
# Metrics / Prometheus
#############################################

spark.ui.prometheus.enabled                 true


#############################################
# Dynamic Allocation (TẮT - RẤT QUAN TRỌNG)
#############################################

spark.dynamicAllocation.enabled             false


#############################################
# Security (disabled for local cluster)
#############################################

spark.rpc.authentication.enabled            false
spark.rpc.encryption.enabled                false
spark.local.storage.encryption.enabled      false
spark.ssl.enabled                           false


#############################################
# Network stability
#############################################

spark.network.timeout                       600s
spark.executor.heartbeatInterval            60s