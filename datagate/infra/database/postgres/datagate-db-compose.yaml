services:
  datagate_database:
    image: timescale/timescaledb:2.26.3-pg18
    container_name: datagate_database
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - datagate_database_postgres:/var/lib/postgresql
      - ./init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - datagate-net

volumes:
  datagate_database_postgres:

networks:
  datagate-net:
    external: true