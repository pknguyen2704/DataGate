services:
  datagate_dashboard:
    build: .
    container_name: datagate_dashboard
    env_file:
      - .env
    ports:
      - '3000:3000'
    volumes:
      - datagate_grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - datagate-net

volumes:
  datagate_grafana_data:

networks:
  datagate-net:
    external: true
