services:
  datagate_database:
    image: postgres:18
    container_name: datagate_database
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - database:/var/lib/postgresql
    restart: unless-stopped 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - datagate-net
volumes:
  database:
networks:
  datagate-net:
    external: true
