services:
  datagate-spark-master:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    hostname: datagate-spark-master
    container_name: datagate-spark-master
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    volumes:
      - ./conf:/opt/spark/conf
      - ./volumes/spark-events:/tmp/spark-events
      - ${SPARK_JOBS_DIR}/pyspark:/opt/spark/apps/pyspark:ro
      - ${SPARK_JOBS_DIR}/java:/opt/spark/apps/java:ro
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host datagate-spark-master
      --port 7077
      --webui-port 8080
    networks:
      - datagate-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  datagate-spark-worker-1:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    hostname: datagate-spark-worker-1
    container_name: datagate-spark-worker-1
    depends_on:
      datagate-spark-master:
        condition: service_healthy
    ports:
      - "8081:8081"
    env_file:
      - ./.env
    volumes:
      - ./conf:/opt/spark/conf
      - ./volumes/spark-events:/tmp/spark-events
      - ${SPARK_JOBS_DIR}/pyspark:/opt/spark/apps/pyspark:ro
      - ${SPARK_JOBS_DIR}/java:/opt/spark/apps/java:ro
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      --cores 2
      --memory 4G
      --webui-port 8081
      spark://datagate-spark-master:7077
    networks:
      - datagate-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  datagate-spark-worker-2:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    hostname: datagate-spark-worker-2
    container_name: datagate-spark-worker-2
    depends_on:
      datagate-spark-master:
        condition: service_healthy
    ports:
      - "8082:8082"
    env_file:
      - ./.env
    volumes:
      - ./conf:/opt/spark/conf
      - ./volumes/spark-events:/tmp/spark-events
      - ${SPARK_JOBS_DIR}/pyspark:/opt/spark/apps/pyspark:ro
      - ${SPARK_JOBS_DIR}/java:/opt/spark/apps/java:ro
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      --cores 2
      --memory 4G
      --webui-port 8082
      spark://datagate-spark-master:7077
    networks:
      - datagate-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  datagate-spark-client:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    hostname: datagate-spark-client
    container_name: datagate-spark-client
    depends_on:
      datagate-spark-master:
        condition: service_healthy
      datagate-spark-worker-1:
        condition: service_healthy
      datagate-spark-worker-2:
        condition: service_healthy
    env_file:
      - ./.env
    volumes:
      - ./conf:/opt/spark/conf
      - ./volumes/spark-events:/tmp/spark-events
      - ${SPARK_JOBS_DIR}/pyspark:/opt/spark/apps/pyspark:ro
      - ${SPARK_JOBS_DIR}/java:/opt/spark/apps/java:ro
    command: ["bash", "-lc", "tail -f /dev/null"]
    networks:
      - datagate-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -x /opt/spark/bin/spark-submit"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  datagate-net:
    external: true