# Default system properties included when running spark-submit.
# This is useful for setting default environmental settings.

# Timezone
spark.driver.extraJavaOptions   -Duser.timezone=Asia/Ho_Chi_Minh
spark.executor.extraJavaOptions -Duser.timezone=Asia/Ho_Chi_Minh
spark.sql.session.timeZone      Asia/Ho_Chi_Minh

# Metrics / Prometheus
spark.ui.prometheus.enabled     true
spark.submit.deployMode         client
spark.app.name                  datagate-spark

# Security
spark.rpc.authentication.enabled false
spark.rpc.encryption.enabled false
spark.local.storage.encryption.enabled false
spark.ssl.enabled false

# Scheduler for multi-jobs fairness
spark.scheduler.mode                  FAIR
spark.scheduler.allocation.file       /opt/spark/conf/fairscheduler.xml

# Small cluster defaults
spark.sql.shuffle.partitions          32
spark.default.parallelism             32

spark.eventLog.enabled                true
spark.eventLog.dir                    /tmp/spark-events

